<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grafo Pedal Hidrográfico</title>
<style>
:root{
 --bg:#ffffff;--bg2:#f5f4ef;--bg3:#ebe9e1;--text:#1c1c1a;--text2:#5f5e5a;
 --text3:#8a897f;--border:#dcdad0;--accent:#534ab7;--accent2:#7f77dd;
}
@media (prefers-color-scheme:dark){
 :root{--bg:#1c1b19;--bg2:#262521;--bg3:#33322c;--text:#ececec;
  --text2:#a5a49d;--text3:#76756d;--border:#3a3930;--accent:#afa9ec;--accent2:#7f77dd;}
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
 font-size:14px;line-height:1.5;display:flex;flex-direction:column;height:100vh}
header{padding:14px 20px 10px;border-bottom:1px solid var(--border)}
h1{margin:0;font-size:18px;font-weight:600}
header p{margin:3px 0 0;font-size:12px;color:var(--text2)}
.bar{display:flex;gap:8px;align-items:center;padding:10px 20px;flex-wrap:wrap;
 border-bottom:1px solid var(--border)}
input,button{font:inherit;border:1px solid var(--border);border-radius:8px;
 background:var(--bg);color:var(--text);padding:7px 11px;height:34px}
input{flex:1;min-width:170px}
button{cursor:pointer}
button:hover{background:var(--bg2)}
.legend{display:flex;flex-wrap:wrap;gap:6px;padding:8px 20px;border-bottom:1px solid var(--border)}
.chip{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 9px;
 border:1px solid var(--border);border-radius:20px;cursor:pointer;user-select:none;
 background:var(--bg);color:var(--text2)}
.chip.off{opacity:.4}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
main{flex:1;display:flex;min-height:0}
#stage{flex:1;position:relative;background:var(--bg2)}
#g{width:100%;height:100%;display:block;touch-action:none}
aside{width:280px;border-left:1px solid var(--border);padding:16px;overflow:auto;
 background:var(--bg)}
aside h2{font-size:14px;margin:0 0 4px}
aside table{width:100%;border-collapse:collapse;font-size:13px}
aside td{padding:4px 0;vertical-align:top}
aside td:first-child{color:var(--text2);width:108px}
a{color:var(--accent)}
.edge{stroke:var(--border)}
.node{cursor:pointer}
.lbl{font-size:11px;fill:var(--text);pointer-events:none;text-anchor:middle;
 paint-order:stroke;stroke:var(--bg2);stroke-width:3px}
.muted{color:var(--text3);font-size:12px}
footer{padding:6px 20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)}
@media (max-width:720px){aside{display:none}}
</style>
</head>

   ln.setAttribute("x1",a.x*S+TX);ln.setAttribute("y1",a.y*S+TY);

   ln.setAttribute("class","edge");
   ln.setAttribute("stroke-width",(s===sel||t===sel)?2:1);
   view.appendChild(ln);}});
 Object.keys(vis).map(Number).forEach(function(i){
   var p=P[i],ty=TYPE[G.nodes[i].t],cx=p.x*S+TX,cy=p.y*S+TY;
   var c=document.createElementNS(NS,"circle");
   c.setAttribute("cx",cx);c.setAttribute("cy",cy);
   c.setAttribute("r",ty.r+(i===sel?3:0));
   c.setAttribute("fill",ty.c);
   c.setAttribute("stroke",i===sel?"var(--text)":"var(--bg2)");
   c.setAttribute("stroke-width",i===sel?2.5:1.5);
   c.setAttribute("class","node");c.setAttribute("data-i",i);
   c.setAttribute("opacity",exp[i]||i===sel?1:0.9);
   view.appendChild(c);
   if(G.nodes[i].t===0||i===sel||i===hover||nbr[i]){
     var tx=document.createElementNS(NS,"text"),L=G.nodes[i].l;
     tx.setAttribute("x",cx);tx.setAttribute("y",cy-ty.r-5);
     tx.setAttribute("class","lbl");
     tx.textContent=L.length>28?L.slice(0,27)+"…":L;
     view.appendChild(tx);}});
 var nv=Object.keys(vis).length;
 foot.textContent=nv+" de "+G.nodes.length+" nós visíveis · "+
   G.edges.length+" arestas no grafo completo · clique num nó para expandir.";}
function fmtDur(s){var h=Math.floor(s/3600),m=Math.round((s%3600)/60);
 return(h?h+"h ":"")+m+"min";}
function renderDetail(){
 var n=G.nodes[sel],ty=TYPE[n.t],rows=[];
 if(n.t===0){
   if(n.title&&n.title!==n.l)rows.push(["Nome",esc(n.title)]);
   if(n.date)rows.push(["Data",esc(n.date)]);
   if(n.cat)rows.push(["Categoria",esc(n.cat)]);
   rows.push(["Conexões",adj[sel].length]);
 }else if(n.t===1){
   if(n.ig)rows.push(["Instagram",'<a href="https://instagram.com/'+esc(n.ig)+
     '" target="_blank" rel="noopener">@'+esc(n.ig)+'</a>']);
   var rc=adj[sel].filter(function(e){return G.nodes[e.o].t===0;}).length;
   rows.push(["Pedais",rc]);
 }else if(n.t===2||n.t===3){
   rows.push(["Tipo",n.t===2?"Rota planejada":"Atividade registrada"]);
   if(n.kj)rows.push(["Energia",n.kj+" kJ"]);
   if(n.dur)rows.push(["Tempo em movimento",fmtDur(n.dur)]);
   if(n.url)rows.push(["Fonte",'<a href="'+esc(n.url)+
     '" target="_blank" rel="noopener">'+esc(n.l)+'</a>']);
 }else if(n.t===4){
   if(n.url)rows.push(["Link",'<a href="'+esc(n.url)+
     '" target="_blank" rel="noopener">abrir no Instagram</a>']);
 }else if(n.t===5){rows.push(["Tipo","Narrativa do pedal"]);}
 else if(n.t===6){
   rows.push(["Arquivo",esc(n.l)]);
   rows.push(["Tipo",/\.MOV$/i.test(n.l)?"Vídeo":"Foto georreferenciada"]);
   if(n.img)rows.push(["Thumbnail",'<a href="../public/'+esc(n.img)+
     '" target="_blank" rel="noopener">abrir</a>']);
 }
 var h='<h2><span class="dot" style="background:'+ty.c+'"></span> '+esc(n.l)+'</h2>'
  +'<p class="muted">'+ty.n+'</p><table>'
  +rows.map(function(r){return'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';}).join("")
  +'</table>';
 if(!exp[sel]&&adj[sel].length)
   h+='<p class="muted">Clique no nó para expandir '+adj[sel].length+' conexões.</p>';
 detail.innerHTML=h;}
var dl=document.getElementById("opts");
G.nodes.forEach(function(n){var o=document.createElement("option");o.value=n.l;dl.appendChild(o);});
document.getElementById("search").addEventListener("change",function(e){
 for(var i=0;i<G.nodes.length;i++)if(G.nodes[i].l===e.target.value){
   hidden[G.nodes[i].t]=0;syncLegend();show(i,0,0);expand(i);select(i);break;}});
document.getElementById("reset").addEventListener("click",reset);
document.getElementById("expandall").addEventListener("click",expandAll);
var lg=document.getElementById("legend");
function syncLegend(){[].forEach.call(lg.children,function(ch,t){
 ch.className="chip"+(hidden[t]?" off":"");});}
TYPE.forEach(function(t,ti){
 var ch=document.createElement("div");ch.className="chip";
 ch.innerHTML='<span class="dot" style="background:'+t.c+'"></span>'+t.n;
 ch.addEventListener("click",function(){
   hidden[ti]=hidden[ti]?0:1;
   if(hidden[ti])Object.keys(vis).forEach(function(k){
     if(G.nodes[k].t===ti){delete vis[k];delete exp[k];}});
   syncLegend();heat=Math.max(heat,0.3);});
 lg.appendChild(ch);});
var drag=null,moved=false,dx0=0,dy0=0;
svg.addEventListener("pointerdown",function(e){
 var t=e.target;if(t.getAttribute("class")==="node"){
   drag=+t.getAttribute("data-i");moved=false;dx0=e.clientX;dy0=e.clientY;
   svg.setPointerCapture(e.pointerId);}});
svg.addEventListener("pointermove",function(e){
 if(drag==null)return;
 if(Math.hypot(e.clientX-dx0,e.clientY-dy0)>4)moved=true;
 var r=svg.getBoundingClientRect();
 var sx=(e.clientX-r.left)*1000/r.width,sy=(e.clientY-r.top)*640/r.height;
 var p=P[drag];p.x=(sx-TX)/S;p.y=(sy-TY)/S;p.vx=0;p.vy=0;p.pin=true;
 heat=Math.max(heat,0.35);});
svg.addEventListener("pointerup",function(e){
 if(drag!=null){if(!moved){select(drag);if(!exp[drag])expand(drag);}P[drag].pin=false;}
 drag=null;});
svg.addEventListener("mouseover",function(e){
 if(e.target.getAttribute("class")==="node")hover=+e.target.getAttribute("data-i");});
svg.addEventListener("mouseout",function(e){
 if(e.target.getAttribute("class")==="node")hover=-1;});
function loop(){if(heat>0.012){for(var k=0;k<2;k++)tick();fit();heat*=0.978;}
 draw();requestAnimationFrame(loop);}
document.getElementById("sub").textContent=
 G.nodes.filter(function(n){return n.t===0;}).length+" pedais · "+
 G.nodes.filter(function(n){return n.t===1;}).length+" pessoas · "+
 G.nodes.length+" nós · "+G.edges.length+" arestas (grafo RDF completo).";
reset();loop();
</script>
</body>
</html>
