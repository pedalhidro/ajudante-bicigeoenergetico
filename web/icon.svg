<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Pedal Hidrográfico — app icon (v3, "wild watershed").
    Sem coroa central. Bacias hidrográficas assimétricas: rios em ciano
    (com elos de corrente) descendo em vários ângulos, cumeadas em marrom
    tracejado dividindo as bacias, selas amarelas marcando os pontos onde
    a cumeada baixa e a água troca de bacia, mais piquetes de pico nos
    cantos. Sem simetria — o caos lembra uma carta topográfica de campo.
  -->
  <defs>
    <linearGradient id="earth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8a5a37"/>
      <stop offset="55%"  stop-color="#c08c5d"/>
      <stop offset="100%" stop-color="#e6b889"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.28" cy="0.22" r="0.42">
      <stop offset="0%"   stop-color="#ffe066" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#ffa730" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffa730" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3aa3d8"/>
      <stop offset="100%" stop-color="#1d6a9c"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Fundo terra -->
    <rect width="512" height="512" fill="url(#earth)"/>

    <!-- Curvas de nível "tortas" — heterogêneas, sugerem relevo irregular -->
    <g fill="none" stroke="#5e3b1f" stroke-opacity="0.17" stroke-width="2.5">
      <path d="M -20 40  Q 90 30  180 60  Q 280 90  380 50  T 540 60"/>
      <path d="M -20 95  Q 80 80  200 100 Q 320 120 430 90  T 540 100"/>
      <path d="M -20 150 Q 100 140 220 155 Q 340 175 460 145 T 540 150"/>
      <path d="M -20 360 Q 80 345 200 380 Q 320 400 430 365 T 540 375"/>
      <path d="M -20 420 Q 100 405 220 435 Q 340 450 460 425 T 540 435"/>
      <path d="M -20 478 Q 90 470 200 485 Q 320 495 430 478 T 540 482"/>
    </g>

    <!-- Halo solar no canto sup. esq. — energia descentrada -->
    <circle cx="140" cy="115" r="200" fill="url(#sun)"/>

    <!-- ── CUMEADAS (ridges) ──────────────────────────────────────────────
         Três cumeadas em ângulos e comprimentos diferentes, marrom escuro
         tracejado. Dividem o mapa em sub-bacias irregulares. -->
    <g fill="none" stroke="#4a230f" stroke-width="15"
       stroke-linecap="round" stroke-dasharray="22 15">
      <!-- Cumeada principal — diagonal NO → SE, "Serra" do mapa -->
      <path d="M 30 90 Q 180 105 290 200 Q 380 290 488 360"/>
      <!-- Cumeada secundária — pé da serra subindo do SO -->
      <path d="M 40 480 Q 110 410 175 365 Q 215 340 250 320"/>
      <!-- Cumeada lateral — encosta nordeste -->
      <path d="M 480 60 Q 430 160 420 240"/>
    </g>
    <!-- Highlight terra-claro nas cristas (suga luz no topo do dorso) -->
    <g fill="none" stroke="#e6b889" stroke-width="4"
       stroke-linecap="round" stroke-dasharray="3 33">
      <path d="M 30 90 Q 180 105 290 200 Q 380 290 488 360"/>
      <path d="M 40 480 Q 110 410 175 365 Q 215 340 250 320"/>
      <path d="M 480 60 Q 430 160 420 240"/>
    </g>

    <!-- ── RIOS / corrente ────────────────────────────────────────────────
         Múltiplos sistemas, ângulos diversos, tributários longos e curtos.
         Cruzam as cumeadas só nas selas (boas práticas topo) — mas sem
         purismo geométrico. -->
    <g fill="none" stroke="url(#water)" stroke-width="22"
       stroke-linecap="round" stroke-linejoin="round">
      <!-- Rio principal: nasce no NE, desce em SW através do "alvéolo"
           entre as duas cumeadas. -->
      <path d="M 470 30 Q 425 80 395 145 Q 370 210 335 270 Q 295 340 230 395 Q 165 445 80 488"/>
      <!-- Tributário grande do norte -->
      <path d="M 290 40 Q 320 90 360 130 Q 380 145 395 145"/>
      <!-- Tributário do leste -->
      <path d="M 510 200 Q 460 215 415 230 Q 385 240 370 230 Q 360 220 335 270"/>
      <!-- Tributário curto do interior -->
      <path d="M 200 230 Q 260 250 295 270 Q 320 285 335 270"/>
      <!-- Tributário do oeste, vindo de muito longe -->
      <path d="M 20 260 Q 90 290 160 305 Q 200 315 230 395"/>
      <!-- Sub-tributário do oeste, curto -->
      <path d="M 30 380 Q 90 405 140 420 Q 170 435 165 445"/>

      <!-- Segundo sistema, no canto SE — bacia menor independente -->
      <path d="M 360 510 Q 395 460 425 415 Q 450 370 470 320"/>
      <!-- Tributário do segundo sistema -->
      <path d="M 480 500 Q 450 460 425 415"/>
    </g>
    <!-- Elos da corrente (pinos claros) sobre os leitos -->
    <g fill="none" stroke="#bde6ff" stroke-width="8"
       stroke-linecap="round" stroke-dasharray="3 20">
      <path d="M 470 30 Q 425 80 395 145 Q 370 210 335 270 Q 295 340 230 395 Q 165 445 80 488"/>
      <path d="M 290 40 Q 320 90 360 130 Q 380 145 395 145"/>
      <path d="M 510 200 Q 460 215 415 230 Q 385 240 370 230 Q 360 220 335 270"/>
      <path d="M 200 230 Q 260 250 295 270 Q 320 285 335 270"/>
      <path d="M 20 260 Q 90 290 160 305 Q 200 315 230 395"/>
      <path d="M 30 380 Q 90 405 140 420 Q 170 435 165 445"/>
      <path d="M 360 510 Q 395 460 425 415 Q 450 370 470 320"/>
      <path d="M 480 500 Q 450 460 425 415"/>
    </g>

    <!-- ── SELAS (saddle points) ──────────────────────────────────────────
         Onde a cumeada baixa e o rio cruza: pequena cruz amarela (eixo
         da cumeada) × cruz azul (eixo do vale) + losango central. -->
    <g>
      <!-- Sela sobre a cumeada principal, na altura da curva NE -->
      <g transform="translate(175, 110) rotate(15)">
        <line x1="-22" y1="0" x2="22" y2="0" stroke="#ffd03a" stroke-width="5" stroke-linecap="round"/>
        <line x1="0" y1="-22" x2="0" y2="22" stroke="#1d6a9c" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
        <polygon points="0,-12 12,0 0,12 -12,0" fill="#ffd03a" stroke="#4a230f" stroke-width="2"/>
      </g>
      <!-- Sela onde rio principal cruza a cumeada principal -->
      <g transform="translate(305, 245) rotate(-35)">
        <line x1="-22" y1="0" x2="22" y2="0" stroke="#ffd03a" stroke-width="5" stroke-linecap="round"/>
        <line x1="0" y1="-22" x2="0" y2="22" stroke="#1d6a9c" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
        <polygon points="0,-12 12,0 0,12 -12,0" fill="#ffd03a" stroke="#4a230f" stroke-width="2"/>
      </g>
      <!-- Sela na cumeada lateral NE -->
      <g transform="translate(434, 195) rotate(70)">
        <line x1="-20" y1="0" x2="20" y2="0" stroke="#ffd03a" stroke-width="5" stroke-linecap="round"/>
        <line x1="0" y1="-20" x2="0" y2="20" stroke="#1d6a9c" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
        <polygon points="0,-10 10,0 0,10 -10,0" fill="#ffd03a" stroke="#4a230f" stroke-width="2"/>
      </g>
      <!-- Sela na cumeada secundária SO -->
      <g transform="translate(140, 400) rotate(50)">
        <line x1="-20" y1="0" x2="20" y2="0" stroke="#ffd03a" stroke-width="5" stroke-linecap="round"/>
        <line x1="0" y1="-20" x2="0" y2="20" stroke="#1d6a9c" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
        <polygon points="0,-10 10,0 0,10 -10,0" fill="#ffd03a" stroke="#4a230f" stroke-width="2"/>
      </g>
    </g>

    <!-- ── PICOS — triangulinhos nos cantos altos (peak benchmarks) ─────── -->
    <g fill="#4a230f" stroke="#e6b889" stroke-width="2.5" stroke-linejoin="round">
      <polygon points="35,80  20,110 56,110"/>
      <polygon points="495,55 478,90 514,90"/>
      <polygon points="495,360 478,395 514,395"/>
      <polygon points="232,308 215,340 252,340"/>
    </g>
  </g>
</svg>
